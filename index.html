<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYPS | Dunes Youth Parliament</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 5vh 5vw; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 80px; }
        .nav-links { display: flex; gap: 40px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .nav-links span:hover { opacity: 0.5; }

        /* Content Sections */
        .page { display: none; }
        .page.active { display: block; }
        h1 { font-size: clamp(3rem, 8vw, 6rem); letter-spacing: -3px; line-height: 0.9; margin-bottom: 40px; }
        
        /* Interactive Elements */
        .card { border: 1px solid #000; padding: 30px; margin-bottom: 20px; cursor: pointer; }
        .card:hover { background: #000; color: #fff; }
        
        /* Form Styling */
        form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin-top: 20px; }
        input { border: 2px solid #000; padding: 15px; font-size: 1rem; outline: none; }
        button { background: #000; color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: 800; }
        button:hover { background: #333; }

        footer { margin-top: 100px; display: flex; justify-content: space-between; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; letter-spacing: -1px;">DYPS '26</div>
        <div class="nav-links">
            <span onclick="showPage('home')">Home</span>
            <span onclick="showPage('events')">Events</span>
            <span onclick="showPage('apply')">Ambassador</span>
        </div>
    </nav>

    <div id="home" class="page active">
        <h1>We turn student discourse into global policy.</h1>
        <p style="max-width: 500px; font-size: 1.2rem;">The premier MUN community in Kutch. Join the movement.</p>
    </div>

    <div id="events" class="page">
        <h1>Events.</h1>
        <div class="card" onclick="this.innerHTML='Agenda: Climate Finance & Nuclear Proliferation'">Upcoming: Summit 2026 (Click for Agenda)</div>
        <div class="card" onclick="this.innerHTML='Agenda: Global Trade Security'">Past: MUN 2025 (Click for Agenda)</div>
    </div>

    <div id="apply" class="page">
        <h1>Become an Ambassador.</h1>
        <form id="contactForm" onsubmit="event.preventDefault(); alert('Application Received.');">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Institutional Email" required>
            <button type="submit">Send Application</button>
        </form>
    </div>

    <footer>
        <div>© 2026 Dunes Kutch</div>
        <div style="display: flex; gap: 20px;">
            <a href="#" style="color: black;">LINKEDIN</a>
            <a href="#" style="color: black;">INSTAGRAM</a>
        </div>
    </footer>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
